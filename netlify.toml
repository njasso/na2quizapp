[build]
  base    = "frontend"
  command = "CI=false npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION       = "20"
  CI                 = "false"
  GENERATE_SOURCEMAP = "false"

# ✅ Redirection des appels API vers Render
[[redirects]]
  from   = "/api/*"
  to     = "https://na2quizapp.onrender.com/api/:splat"
  status = 200
  force  = true

# ✅ Redirection des appels Socket.IO vers Render (AJOUT OBLIGATOIRE)
[[redirects]]
  from   = "/socket.io/*"
  to     = "https://na2quizapp.onrender.com/socket.io/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"