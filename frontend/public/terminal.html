<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Terminal Examen</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 1rem;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 {
      color: #2c3e50;
    }
    .question {
      margin-bottom: 1.5rem;
    }
    .question-title {
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    ul {
      padding-left: 1.2rem;
    }
    .waiting {
      text-align: center;
      font-size: 1.2rem;
      color: #555;
      margin-top: 3rem;
    }
  </style>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>📡 Terminal d’Examen</h1>
    <div id="status" class="waiting">En attente d'une épreuve à distance…</div>
    <div id="exam-container" style="display: none;"></div>
  </div>
  <script>
    const SERVER_URL = 'http://192.168.0.1:5000'; // IP de votre serveur Node.js
    const socket = io(SERVER_URL);

    // Récupérer le userId depuis l'URL (ex: ?userId=T1)
    const params = new URLSearchParams(window.location.search);
    const userId = params.get("userId") || `unknown-${Math.floor(Math.random() * 1000)}`;

    socket.on('connect', () => {
      console.log("Connecté au serveur en tant que terminal");
      socket.emit('joinExam', { userId, examId: null });
    });

    socket.on('startExam', async ({ examId }) => {
      console.log("Examen reçu:", examId);
      document.getElementById("status").innerText = "Chargement de l'épreuve...";

      try {
        console.log(`Tentative de récupération de l'examen avec l'ID: ${examId}`);
        const response = await fetch(`${SERVER_URL}/api/exams/${examId}`);
        if (!response.ok) {
          throw new Error(`Erreur HTTP: ${response.status}`);
        }
        const exam = await response.json();
        console.log("Examen récupéré avec succès:", exam);

        document.getElementById("status").style.display = 'none';
        const container = document.getElementById("exam-container");
        container.style.display = 'block';

        const title = document.createElement('h2');
        title.innerText = `${exam.title} (${exam.matiere} - ${exam.niveau})`;
        container.appendChild(title);

        const desc = document.createElement('p');
        desc.innerText = exam.description;
        container.appendChild(desc);

        exam.questions.forEach((q, index) => {
          const div = document.createElement('div');
          div.className = 'question';

          const qTitle = document.createElement('div');
          qTitle.className = 'question-title';
          qTitle.innerText = `${index + 1}. ${q.question}`;
          div.appendChild(qTitle);

          const list = document.createElement('ul');
          q.options.forEach(opt => {
            const li = document.createElement('li');
            li.innerText = opt;
            list.appendChild(li);
          });
          div.appendChild(list);
          container.appendChild(div);
        });

        // Notifier le serveur que l’examen a démarré
        socket.emit('examStarted', {
          userId,
          examId,
          socketId: socket.id,
          userName: userId
        });
      } catch (err) {
        console.error("Erreur lors du chargement de l'épreuve:", err);
        document.getElementById("status").innerText = "Erreur de chargement de l'épreuve.";
      }
    });

    socket.on('disconnect', () => {
      console.log("Déconnecté du serveur");
    });
  </script>
</body>
</html>
